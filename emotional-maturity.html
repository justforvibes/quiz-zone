<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotional Maturity Test — Know Yourself</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0eb; --card: #fffdf9; --border: #e2d9ce;
      --text: #2c2416; --muted: #9a8f82; --accent: #c0845a;
      --accent2: #7a9e8e; --soft: #e8ddd4;
    }
    body { background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 80px; }
    .wrap { position:relative;z-index:1;width:100%;max-width:580px; }
    header { text-align:center;margin-bottom:36px; }
    .back-link { display:inline-block;margin-bottom:24px;color:var(--accent);font-size:13px;text-decoration:none; }
    .back-link:hover { text-decoration:underline; }
    .tag { display:inline-block;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:14px; }
    h1 { font-family:'Lora',serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:600;line-height:1.2;color:var(--text); }
    header p { margin-top:12px;color:var(--muted);font-size:14px;font-weight:300;line-height:1.6; }
    .progress-wrap { margin-bottom:28px; }
    .progress-label { display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px; }
    .progress-bar { height:4px;background:var(--soft);border-radius:100px;overflow:hidden; }
    .progress-fill { height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width 0.4s ease; }
    .card { background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px 28px;box-shadow:0 4px 24px rgba(192,132,90,0.08); }
    .question-num { font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px; }
    .question-text { font-family:'Lora',serif;font-size:1.15rem;font-weight:600;line-height:1.5;color:var(--text);margin-bottom:24px; }
    .options { display:flex;flex-direction:column;gap:10px; }
    .opt { padding:14px 18px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;text-align:left;cursor:pointer;transition:all 0.2s;line-height:1.5; }
    .opt:hover { border-color:var(--accent);background:rgba(192,132,90,0.06); }
    .opt.selected { border-color:var(--accent);background:rgba(192,132,90,0.1); }
    .nav-row { display:flex;gap:10px;margin-top:24px; }
    .btn-back { padding:12px 20px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s; }
    .btn-back:hover { border-color:var(--accent);color:var(--text); }
    .btn-next { flex:1;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-family:'Lora',serif;font-size:15px;font-style:italic;cursor:pointer;transition:opacity 0.2s,transform 0.15s;opacity:0.4;pointer-events:none; }
    .btn-next.active { opacity:1;pointer-events:all; }
    .btn-next.active:hover { opacity:0.9;transform:translateY(-1px); }
    .result-box { animation:fadeUp 0.6s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .result-type-tag { display:inline-block;padding:6px 18px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px; }
    .result-title { font-family:'Lora',serif;font-size:clamp(1.6rem,6vw,2.4rem);font-weight:600;line-height:1.2;margin-bottom:8px; }
    .result-subtitle { font-size:14px;color:var(--muted);margin-bottom:24px;font-style:italic; }
    .scores { margin-bottom:28px;display:flex;flex-direction:column;gap:12px; }
    .score-row { }
    .score-label { display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px; }
    .score-bar { height:6px;background:var(--soft);border-radius:100px;overflow:hidden; }
    .score-fill { height:100%;border-radius:100px;transition:width 1s ease; }
    .detail-sections { display:flex;flex-direction:column;gap:16px;margin-bottom:24px; }
    .detail-card { background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:18px 20px; }
    .detail-card h3 { font-family:'Lora',serif;font-size:0.95rem;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px; }
    .detail-card p { font-size:13px;color:var(--muted);line-height:1.8; }
    .share-btn { width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent2);color:#fff;font-family:'Lora',serif;font-size:15px;font-style:italic;cursor:pointer;transition:opacity 0.2s;margin-bottom:12px; }
    .share-btn:hover { opacity:0.9; }
    .retake-btn { width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-family:'Nunito',sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s;margin-bottom:12px; }
    .retake-btn:hover { background:rgba(192,132,90,0.08); }
    .home-btn { width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:block;text-align:center; }
    .home-btn:hover { border-color:var(--accent);color:var(--text); }
    footer { margin-top:40px;text-align:center;color:var(--muted);font-size:12px; }
    footer a { color:var(--accent);text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="index.html">← All Quizzes</a>
  <header>
    <div class="tag">🌱 Emotional Maturity</div>
    <h1>Emotional Maturity Test</h1>
    <p>How do you handle emotions, conflict, and self-awareness? This quiz goes beneath the surface.</p>
  </header>
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">Question 1 of 12</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="card" id="quizCard">
    <div class="question-num" id="qNum"></div>
    <div class="question-text" id="qText"></div>
    <div class="options" id="optionsWrap"></div>
    <div class="nav-row">
      <button class="btn-back" id="btnBack" onclick="goBack()" style="display:none">← Back</button>
      <button class="btn-next" id="btnNext" onclick="goNext()">Continue →</button>
    </div>
  </div>
  <footer>Made with 💗 by <a href="https://justforvibes.github.io">JustForVibes</a> · For self-reflection, not clinical diagnosis.</footer>
</div>
<script>
const questions = [
  { text: "When you're upset, your first instinct is to...", opts: [
    { text: "Sit with the feeling and try to understand it", scores: {H:3,G:0,D:0,R:0} },
    { text: "Talk to someone I trust about it", scores: {H:2,G:1,D:0,R:0} },
    { text: "Distract myself — I don't want to feel it", scores: {H:0,G:0,D:3,R:0} },
    { text: "React — say or do something I may regret", scores: {H:0,G:0,D:0,R:3} }
  ]},
  { text: "When someone criticizes you, you typically...", opts: [
    { text: "Consider if there's truth in it before responding", scores: {H:3,G:0,D:0,R:0} },
    { text: "Feel hurt but keep it together outwardly", scores: {H:1,G:2,D:0,R:0} },
    { text: "Get defensive and argue back", scores: {H:0,G:0,D:0,R:3} },
    { text: "Shut down and go quiet for hours", scores: {H:0,G:0,D:3,R:0} }
  ]},
  { text: "How do you handle your own mistakes?", opts: [
    { text: "Acknowledge them, apologize, and try to do better", scores: {H:3,G:0,D:0,R:0} },
    { text: "Beat myself up about them for a long time", scores: {H:0,G:3,D:0,R:0} },
    { text: "Minimise or explain them away", scores: {H:0,G:0,D:0,R:3} },
    { text: "Try not to think about them", scores: {H:0,G:0,D:3,R:0} }
  ]},
  { text: "When a close friend is going through something hard, you...", opts: [
    { text: "Listen fully before offering any advice", scores: {H:3,G:0,D:0,R:0} },
    { text: "Jump in with solutions right away", scores: {H:0,G:0,D:0,R:2} },
    { text: "Feel their pain so deeply it overwhelms me", scores: {H:0,G:3,D:0,R:0} },
    { text: "Feel uncomfortable and try to cheer them up quickly", scores: {H:0,G:0,D:3,R:0} }
  ]},
  { text: "Your honest relationship with your own emotions is...", opts: [
    { text: "I can name and understand most of my feelings", scores: {H:3,G:0,D:0,R:0} },
    { text: "I feel deeply but get overwhelmed often", scores: {H:0,G:3,D:0,R:0} },
    { text: "I tend to disconnect from feelings to function", scores: {H:0,G:0,D:3,R:0} },
    { text: "I act on them before I fully understand them", scores: {H:0,G:0,D:0,R:3} }
  ]},
  { text: "When you're angry, you tend to...", opts: [
    { text: "Pause, identify why, then communicate calmly", scores: {H:3,G:0,D:0,R:0} },
    { text: "Express it but often regret how I did it", scores: {H:0,G:0,D:0,R:3} },
    { text: "Suppress it and pretend nothing is wrong", scores: {H:0,G:0,D:3,R:0} },
    { text: "Spiral — one thing leads to every other grievance", scores: {H:0,G:3,D:0,R:0} }
  ]},
  { text: "How do you handle disagreements in close relationships?", opts: [
    { text: "Try to understand their view before defending mine", scores: {H:3,G:0,D:0,R:0} },
    { text: "Need to win or feel validated", scores: {H:0,G:0,D:0,R:3} },
    { text: "Avoid them at almost any cost", scores: {H:0,G:0,D:3,R:0} },
    { text: "Get emotionally overwhelmed mid-conversation", scores: {H:0,G:3,D:0,R:0} }
  ]},
  { text: "Are you able to sit with uncertainty or discomfort without acting out?", opts: [
    { text: "Usually yes — I can tolerate uncomfortable feelings", scores: {H:3,G:0,D:0,R:0} },
    { text: "Sometimes, but it takes real effort", scores: {H:2,G:1,D:0,R:0} },
    { text: "No — discomfort makes me want to act immediately", scores: {H:0,G:0,D:0,R:3} },
    { text: "I avoid the feeling entirely rather than sit with it", scores: {H:0,G:0,D:3,R:0} }
  ]},
  { text: "How honest are you with yourself about your own flaws?", opts: [
    { text: "Quite honest — self-awareness matters to me", scores: {H:3,G:0,D:0,R:0} },
    { text: "Honest but very self-critical", scores: {H:1,G:3,D:0,R:0} },
    { text: "I know my flaws exist but avoid examining them", scores: {H:0,G:0,D:3,R:0} },
    { text: "I justify my behaviour more than I should", scores: {H:0,G:0,D:0,R:3} }
  ]},
  { text: "When you feel insecure, you tend to...", opts: [
    { text: "Acknowledge it and try to trace where it comes from", scores: {H:3,G:0,D:0,R:0} },
    { text: "Seek reassurance from others repeatedly", scores: {H:0,G:3,D:0,R:0} },
    { text: "Mask it with confidence or humour", scores: {H:0,G:0,D:3,R:0} },
    { text: "Project it — assume others see my flaws too", scores: {H:0,G:0,D:0,R:3} }
  ]},
  { text: "How do you handle change or loss?", opts: [
    { text: "Allow myself to grieve, then adapt", scores: {H:3,G:0,D:0,R:0} },
    { text: "Get stuck in grief longer than I probably should", scores: {H:0,G:3,D:0,R:0} },
    { text: "Push through by not thinking about it too much", scores: {H:0,G:0,D:3,R:0} },
    { text: "React strongly and make decisions I sometimes regret", scores: {H:0,G:0,D:0,R:3} }
  ]},
  { text: "Which statement best describes your current emotional state?", opts: [
    { text: "'I understand myself well and take responsibility for my reactions'", scores: {H:3,G:0,D:0,R:0} },
    { text: "'I feel deeply and it sometimes overwhelms me'", scores: {H:0,G:3,D:0,R:0} },
    { text: "'I keep emotions at a distance to stay functional'", scores: {H:0,G:0,D:3,R:0} },
    { text: "'I react first and reflect later — if at all'", scores: {H:0,G:0,D:0,R:3} }
  ]}
];
const results = {
  H: { type:"Emotionally Mature", emoji:"🌱", color:"#7a9e8e", tagBg:"rgba(122,158,142,0.15)", tagColor:"#4a7a6a",
    subtitle:"You feel deeply and respond thoughtfully — a rare combination.",
    sections:[
      { icon:"💚", title:"Who you are", text:"You have developed a genuine capacity to understand, name, and process your emotions. You don't suppress them, and you don't let them control you. This emotional intelligence allows you to navigate conflict, loss, and uncertainty with a stability that many people spend a lifetime trying to build." },
      { icon:"🌱", title:"In relationships", text:"You're the kind of partner, friend, and person others feel safe with. You can hold space for others' emotions without being overwhelmed. You take accountability, apologize genuinely, and communicate with clarity. Relationships with you tend to feel grounding." },
      { icon:"⚡", title:"Your challenge", text:"Emotional maturity can sometimes create a gap between you and people who are less self-aware. Patience with others' emotional immaturity is your ongoing practice. Also, being capable doesn't mean you never need support — don't let strength become isolation." },
      { icon:"🔮", title:"What helps you thrive", text:"Relationships with mutual emotional depth. Continued self-reflection. Space to feel your own emotions without always having to be the regulated one. Finding peers who match your level of self-awareness." }
    ]},
  G: { type:"Emotionally Deep but Overwhelmed", emoji:"🌊", color:"#c0845a", tagBg:"rgba(192,132,90,0.15)", tagColor:"#8a5a2a",
    subtitle:"You feel everything — sometimes too much at once.",
    sections:[
      { icon:"🧡", title:"Who you are", text:"Your emotional world is rich and vivid. You feel deeply, empathize readily, and care intensely. The challenge is that this depth can sometimes pull you under — one feeling leads to another, past wounds surface in present moments, and overwhelm becomes a familiar state." },
      { icon:"🌊", title:"In relationships", text:"You love deeply and bring great warmth to your relationships. But your emotional intensity can sometimes feel heavy to others — or to yourself. You may need more reassurance than you want to admit, and conflict can spiral quickly because everything feels connected to something bigger." },
      { icon:"⚡", title:"Your challenge", text:"Learning to feel without being consumed. This often means developing a practice — journaling, therapy, breathwork, meditation — that gives your emotions somewhere to go before they flood your relationships. The goal isn't to feel less, it's to feel with more capacity." },
      { icon:"🔮", title:"What helps you thrive", text:"A partner who is patient and steady. Regular emotional processing outlets. Learning to distinguish between the current moment and old wounds. Knowing that your depth is a gift, not a burden." }
    ]},
  D: { type:"Emotionally Distanced", emoji:"🧊", color:"#8a7a9e", tagBg:"rgba(138,122,158,0.15)", tagColor:"#5a4a7a",
    subtitle:"You function well — by keeping emotions at a careful distance.",
    sections:[
      { icon:"💜", title:"Who you are", text:"You've learned to manage life by not getting too close to your feelings. This likely developed as a protective strategy — at some point, feelings were too painful, too unsafe, or too overwhelming. So you built an efficient system: keep emotions contained, stay rational, stay in control." },
      { icon:"🧊", title:"In relationships", text:"People may experience you as hard to read, emotionally unavailable, or detached. You may struggle to access or express vulnerability. You're capable and reliable — but intimacy requires a softness that your defenses currently block. Partners may feel like they can never fully reach you." },
      { icon:"⚡", title:"Your challenge", text:"Reconnecting with your emotional self — gradually and gently. Emotional suppression is exhausting in the long run and tends to surface in physical symptoms, sudden outbursts, or numbness. Small steps toward vulnerability — with yourself first, then others — can begin to thaw the distance." },
      { icon:"🔮", title:"What helps you thrive", text:"Therapy or journaling to access buried feelings. A safe, non-pressuring relationship. Practices that reconnect you with the body — exercise, nature, creative work. Recognizing that feeling is not weakness — it's the path back to yourself." }
    ]},
  R: { type:"Emotionally Reactive", emoji:"🔥", color:"#9e7a5a", tagBg:"rgba(158,122,90,0.15)", tagColor:"#7a4a2a",
    subtitle:"Your emotions are powerful — and they move faster than your thoughts.",
    sections:[
      { icon:"❤️", title:"Who you are", text:"You are passionate, expressive, and deeply feeling. But your emotions often arrive before your mind can process them, leading to reactions you later regret. This isn't a character flaw — it's usually a nervous system pattern developed under stress or in environments where quick emotional responses were necessary." },
      { icon:"🔥", title:"In relationships", text:"Your intensity can create deep highs but also painful conflict. Small triggers can escalate quickly. You may say things in anger you don't mean, or make impulsive decisions driven by strong emotions. Partners may feel they're walking on eggshells, or may match your energy in ways that spiral." },
      { icon:"⚡", title:"Your challenge", text:"Creating a gap between stimulus and response. The pause — however small — is everything. Practices like naming the emotion before acting, counting to ten, or removing yourself from a heated moment can literally rewire how your nervous system responds over time." },
      { icon:"🔮", title:"What helps you thrive", text:"Learning emotional regulation tools — not to suppress, but to slow down. A stable, patient partner. Therapy that addresses the roots of reactivity. Regular physical release (exercise, movement). Knowing the difference between responding and reacting." }
    ]}
};

let current = 0;
let answers = new Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('qNum').textContent = 'Question ' + (current+1);
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressText').textContent = 'Question ' + (current+1) + ' of ' + questions.length;
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('btnBack').style.display = current > 0 ? 'block' : 'none';
  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers[current] === i ? ' selected' : '');
    btn.textContent = opt.text;
    btn.onclick = () => selectOpt(i);
    wrap.appendChild(btn);
  });
  const next = document.getElementById('btnNext');
  next.textContent = current === questions.length - 1 ? 'See My Result ✦' : 'Continue →';
  next.className = 'btn-next' + (answers[current] !== null ? ' active' : '');
}

function selectOpt(i) {
  answers[current] = i;
  document.querySelectorAll('.opt').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('btnNext').classList.add('active');
}

function goNext() {
  if (answers[current] === null) return;
  if (current < questions.length - 1) {
    current++;
    render();
    document.querySelector('.card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else { showResult(); }
}

function goBack() {
  if (current > 0) { current--; render(); }
}

function showResult() {
  const totals = {};
  Object.keys(results).forEach(k => totals[k] = 0);
  answers.forEach((ans, qi) => {
    if (ans !== null) {
      const scores = questions[qi].opts[ans].scores;
      Object.keys(scores).forEach(k => totals[k] = (totals[k]||0) + scores[k]);
    }
  });
  const winner = Object.keys(totals).reduce((a,b) => totals[a] > totals[b] ? a : b);
  const r = results[winner];
  const total = Object.values(totals).reduce((a,b) => a+b, 0) || 1;
  document.getElementById('progressText').textContent = 'Complete!';
  document.getElementById('progressPct').textContent = '100%';
  document.getElementById('progressFill').style.width = '100%';
  const card = document.getElementById('quizCard');
  card.innerHTML = `
    <div class="result-box">
      <div class="result-type-tag" style="background:${r.tagBg};color:${r.tagColor};">${r.emoji} ${r.type}</div>
      <div class="result-title" style="color:${r.color}">${r.emoji} ${r.type}</div>
      <div class="result-subtitle">${r.subtitle}</div>
      <div class="scores">
        ${Object.entries(totals).map(([k,v]) => `
          <div class="score-row">
            <div class="score-label"><span>${results[k].emoji} ${results[k].type}</span><span>${Math.round((v/total)*100)}%</span></div>
            <div class="score-bar"><div class="score-fill" style="width:${Math.round((v/total)*100)}%;background:${results[k].color}"></div></div>
          </div>`).join('')}
      </div>
      <div class="detail-sections">
        ${r.sections.map(s => `<div class="detail-card"><h3>${s.icon} ${s.title}</h3><p>${s.text}</p></div>`).join('')}
      </div>
      <button class="share-btn" onclick="shareResult('${r.type}','${r.emoji}','${r.subtitle}')">📤 Share My Result</button>
      <button class="retake-btn" onclick="retake()">↩ Retake Quiz</button>
      <a class="home-btn" href="index.html">← Explore More Quizzes</a>
    </div>`;
}

function shareResult(type, emoji, subtitle) {
  const text = emoji + ' My result: ' + type + '\n"' + subtitle + '"\n\nFind out yours 👉 ' + window.location.href;
  if (navigator.share) navigator.share({ title: 'My Quiz Result', text });
  else navigator.clipboard.writeText(text).then(() => alert('Result copied! Share it 🎉'));
}

function retake() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('quizCard').innerHTML = `
    <div class="question-num" id="qNum"></div>
    <div class="question-text" id="qText"></div>
    <div class="options" id="optionsWrap"></div>
    <div class="nav-row">
      <button class="btn-back" id="btnBack" onclick="goBack()" style="display:none">← Back</button>
      <button class="btn-next" id="btnNext" onclick="goNext()">Continue →</button>
    </div>`;
  render();
}

render();

</script>
</body>
</html>
