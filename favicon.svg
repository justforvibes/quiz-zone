<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#fffdf9"/>
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0845a"/>
      <stop offset="100%" stop-color="#7a9e8e"/>
    </linearGradient>
  </defs>
  <!-- Brain-like circle -->
  <circle cx="50" cy="45" r="28" fill="none" stroke="url(#lg)" stroke-width="3"/>
  <!-- Inner lines suggesting mind/depth -->
  <path d="M30 38 Q50 28 70 38" fill="none" stroke="#c0845a" stroke-width="2" stroke-linecap="round"/>
  <path d="M28 50 Q50 42 72 50" fill="none" stroke="#7a9e8e" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 62 Q50 55 68 62" fill="none" stroke="#c0845a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Small dot center -->
  <circle cx="50" cy="45" r="4" fill="url(#lg)"/>
  <!-- Tagline dots -->
  <circle cx="35" cy="80" r="3" fill="#c0845a" opacity="0.7"/>
  <circle cx="50" cy="80" r="3" fill="#9a8f82" opacity="0.5"/>
  <circle cx="65" cy="80" r="3" fill="#7a9e8e" opacity="0.7"/>
</svg>
